<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard - FYP Management System</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  
  <!-- Firebase Configuration (must load after SDK) -->
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script src="js/auth.js"></script>
  <script src="script.js"></script>
  <script src="js/student.js"></script>
  <script src="dashboard-proposal-only.js"></script>
  <script src="js/realtime-database.js"></script>
  
  <!-- Verify Firebase is loaded -->
  <script>
    console.log('🔍 Firebase Check:');
    console.log('- Firebase available:', typeof firebase !== 'undefined');
    console.log('- Firestore available:', typeof firebase !== 'undefined' && typeof firebase.firestore !== 'undefined');
    console.log('- Realtime Database available:', typeof firebase !== 'undefined' && typeof firebase.database !== 'undefined');
    console.log('- Auth available:', typeof firebase !== 'undefined' && typeof firebase.auth !== 'undefined');
  </script>
  
  <!-- Initialize Dashboard Data Loading -->
  <script>
    // Ensure dashboard data loads after Firebase is fully initialized
    document.addEventListener('DOMContentLoaded', function() {
      console.log('� Student Dashboard Loaded');
      
      // Wait for Firebase to be ready, then load data
      const waitForFirebase = () => {
        if (typeof db !== 'undefined' && typeof auth !== 'undefined') {
          console.log('✅ Firebase is ready, loading dashboard data...');
          if (typeof loadAllDashboardData === 'function') {
            loadAllDashboardData();
          } else {
            console.log('⚠️ loadAllDashboardData function not found');
          }
        } else {
          console.log('⏳ Waiting for Firebase to initialize...');
          setTimeout(waitForFirebase, 500);
        }
      };
      
      // Start waiting for Firebase
      setTimeout(waitForFirebase, 1000);
    });
  </script>
</head>

<body>

  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <img src="assets/images/university-logo.png" alt="University Logo" class="logo-img">
      </div>
      <nav class="nav-menu">
        <a href="student-dashboard.html" class="nav-item active">
          <i class="fas fa-tachometer-alt"></i>
          <span>Dashboard</span>
        </a>
        <a href="proposals.html" class="nav-item">
          <i class="fas fa-file-alt"></i>
          <span>Proposals</span>
        </a>
        <a href="meetings-viva.html" class="nav-item">
          <i class="fas fa-calendar-alt"></i>
          <span>Meetings & Viva</span>
        </a>
        <a href="reports-files.html" class="nav-item">
          <i class="fas fa-file-alt"></i>
          <span>Reports & Files</span>
        </a>
        <a href="index.html" class="nav-item logout">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <div class="welcome-section">
          <h1>Welcome, <span id="dynamicUserName">Loading...</span>!</h1>
        </div>
        <div class="action-buttons">
          <button class="btn btn-primary" onclick="openSubmitProposalModal()">
            <i class="fas fa-file-alt"></i>
            Submit Proposal
          </button>
          <button class="btn btn-secondary" onclick="handleFileUpload()">
            <i class="fas fa-upload"></i>
            Upload Report
          </button>
          <button class="btn btn-secondary" onclick="handleMeetingRequest()">
            <i class="fas fa-calendar-plus"></i>
            Request Meeting
          </button>
          <div class="notification-bell" onclick="showNotifications()">
            <i class="fas fa-bell"></i>
            <span class="notification-badge" id="notificationCount">0</span>
          </div>
        </div>
      </header>

      <!-- Dashboard Content -->
      <div class="dashboard-content">
        <!-- Project Overview Card -->
        <div class="card">
          <h3>Project Overview</h3>
          <div class="project-info" id="projectInfo">
            <!-- Project info will be dynamically loaded here -->
          </div>
        </div>

        <!-- Group Members Card -->
        <div class="card">
          <h3>Group Members</h3>
          <div class="members-list" id="membersList">
            <!-- Members will be dynamically loaded here -->
          </div>
        </div>

        <!-- Task Assignments Card -->
        <div class="card">
          <h3>Task Assignments</h3>
          <div class="task-table" id="taskTable">
            <!-- Tasks will be dynamically loaded here -->
          </div>
          <button class="btn btn-primary" onclick="showNewTaskForm()">New Task</button>
        </div>

        <!-- Reports & File Upload Card -->
        <div class="card">
          <h3>Reports & File Upload</h3>
          <div class="file-table" id="fileTable">
            <!-- Files will be dynamically loaded here -->
          </div>
        </div>

        <!-- Meetings & Viva Card -->
        <div class="card">
          <h3>Meetings & Viva</h3>
          <div class="meeting-table" id="meetingTable">
            <!-- Meetings will be dynamically loaded here -->
          </div>
          <button class="btn btn-secondary" onclick="handleMeetingRequest()">Request Meeting</button>
        </div>

        <!-- Proposal Status Card -->
        <div class="card">
          <h3>Proposal Status</h3>
          <div class="proposal-status" id="proposalStatus">
            <!-- Proposal status will be dynamically loaded here -->
          </div>
        </div>

        <!-- Supervisor Feedback Card -->
        <div class="card">
          <h3>Supervisor Feedback</h3>
          <div class="feedback-list" id="feedbackList">
            <!-- Feedback will be dynamically loaded here -->
          </div>
        </div>

        <!-- Announcements Card -->
        <div class="card">
          <h3>Announcements</h3>
          <div class="announcements" id="announcements">
            <!-- Announcements will be dynamically loaded here -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Submit Proposal Modal -->
  <div id="submitProposalModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Submit Proposal</h3>
        <span class="close" onclick="closeSubmitProposalModal()">&times;</span>
      </div>
      <div class="modal-body">
        <form id="submitProposalForm">
          <div class="form-group">
            <label for="proposalTitle">Proposal Title *</label>
            <input type="text" id="proposalTitle" required placeholder="Enter your proposal title">
          </div>
          
          <div class="form-group">
            <label for="proposalCategory">Category *</label>
            <select id="proposalCategory" required>
              <option value="">Select Category</option>
              <option value="ai">AI & Machine Learning</option>
              <option value="web">Web Development</option>
              <option value="mobile">Mobile Development</option>
              <option value="data">Data Science</option>
              <option value="security">Cybersecurity</option>
              <option value="other">Other</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="proposalDescription">Description *</label>
            <textarea id="proposalDescription" rows="6" required placeholder="Describe your proposal in detail..."></textarea>
          </div>
          
          <div class="form-group">
            <label for="proposalObjectives">Objectives *</label>
            <textarea id="proposalObjectives" rows="4" required placeholder="List the main objectives of your project..."></textarea>
          </div>
          
          <div class="form-group">
            <label for="proposalMethodology">Methodology *</label>
            <textarea id="proposalMethodology" rows="4" required placeholder="Describe the methodology and approach..."></textarea>
          </div>
          
          <div class="form-group">
            <label for="proposalTimeline">Timeline (weeks) *</label>
            <input type="number" id="proposalTimeline" min="1" max="52" required placeholder="Expected duration in weeks">
          </div>
          
          <div class="form-group">
            <label for="proposalResources">Required Resources</label>
            <textarea id="proposalResources" rows="3" placeholder="List any specific resources needed..."></textarea>
          </div>
          
          <div class="form-group">
            <label for="proposalFile">Attach File (Optional)</label>
            <input type="file" id="proposalFile" accept=".pdf,.doc,.docx" onchange="handleFileSelect(event)">
            <small id="fileInfo" style="color: #6b7280;">Supported formats: PDF, DOC, DOCX (Max 10MB)</small>
          </div>
          
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="closeSubmitProposalModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Submit Proposal</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Main JavaScript -->
  <script src="script.js"></script>

</body>

</html>
