<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard | FYP Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/style.css" />

  <style>
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 10px 18px;
      border: 1px solid rgba(148,163,184,0.5);
      background: #070000;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .tab-btn:hover {
      box-shadow: 0 10px 18px rgba(15,23,42,0.08);
      transform: translateY(-1px);
      background: #00070e;
    }

    .tab-btn.active {
      background: #2563eb;
      color: #050000;
      border-color: #2563eb;
    }

    .section {
      display: none;
      background: #ffffff;
      padding: 20px;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,0.35);
      box-shadow: 0 10px 22px rgba(15,23,42,0.08);
    }

    .section.active { display: block; }

    table { width: 100%; border-collapse: collapse; }

    th, td { padding: 12px; border-bottom: 1px solid #e5e7eb; text-align: left; }

    th { background: #f5f8ff; color: #1e3a8a; }

    select, button {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      cursor: pointer;
    }

    button.assign {
      background: #2563eb;
      color: #fff;
      border: none;
      font-weight: 800;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    button.assign:hover {
      background: #1e40af;
      box-shadow: 0 12px 20px rgba(30,64,175,0.22);
      transform: translateY(-1px);
    }

    .status { font-weight: 800; }
    .assigned { color: #16a34a; }
    .pending { color: #b45309; }

    .card { padding: 15px; border-bottom: 1px solid #e5e7eb; }
  </style>
</head>

<body>

  <aside class="sidebar">
    <h2>Admin</h2>
    <ul>
      <li class="active">Dashboard</li>
      <li onclick="logout()">Logout</li>
    </ul>
  </aside>

  <main class="main-content">

    <header class="top-bar">
      <h1>Admin Dashboard</h1>
      <p>Manage proposals, supervisors, feedback, and student reports</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" onclick="showSection('proposals', this)">Proposals</button>
      <button class="tab-btn" onclick="showSection('supervisors', this)">Supervisors</button>
      <button class="tab-btn" onclick="showSection('feedback', this)">Supervisor Feedback</button>
      <button class="tab-btn" onclick="showSection('reports', this)">Student Reports</button>
    </div>

    <section id="proposals" class="section active">
      <h2>Project Proposals & Assignment</h2>

      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Project</th>
            <th>Supervisor</th>
            <th>Action</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="proposalTable"></tbody>
      </table>
    </section>

    <section id="supervisors" class="section">
      <h2>Supervisors & Assigned Proposals</h2>
      <div id="supervisorList"></div>
    </section>

    <section id="feedback" class="section">
      <h2>Feedback from Supervisors</h2>
      <div id="feedbackList"></div>
    </section>

    <section id="reports" class="section">
      <h2>Student Progress Reports</h2>
      <div id="reportList"></div>
    </section>

  </main>

  <script>
    if (localStorage.getItem("role") !== "admin") {
      window.location.href = "login.html";
    }

    const supervisors = ["Dr. Ahmed", "Dr. Khan", "Dr. Usman"];

    const proposals = [
      { student: "Ali Raza", project: "Smart Attendance System", supervisor: "", status: "Pending" },
      { student: "laiba Khan", project: "Health Monitoring App", supervisor: "", status: "Pending" }
    ];

    const supervisorFeedback = [
      {
        student: "Ali Raza",
        supervisor: "Dr. Ahmed",
        feedback: "Student is progressing well. Needs better documentation."
      }
    ];

    const studentReports = [
      {
        student: "laiba Khan",
        project: "Health Monitoring App",
        progress: "72%",
        remark: "On track"
      }
    ];

    function showSection(id, btn) {
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

      document.getElementById(id).classList.add("active");
      btn.classList.add("active");
    }

    function loadProposals() {
      const table = document.getElementById("proposalTable");
      table.innerHTML = "";

      proposals.forEach((p, i) => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${p.student}</td>
          <td>${p.project}</td>
          <td>
            <select id="sup-${i}">
              <option value="">Select</option>
              ${supervisors.map(s => `<option value="${s}">${s}</option>`).join("")}
            </select>
          </td>
          <td>
            <button class="assign" onclick="assignSupervisor(${i})">Assign</button>
          </td>
          <td class="status ${p.status === "Assigned" ? "assigned" : "pending"}">
            ${p.status}
          </td>
        `;

        table.appendChild(row);
      });
    }

    function assignSupervisor(index) {
      const select = document.getElementById(`sup-${index}`);
      if (!select.value) {
        alert("Select a supervisor first.");
        return;
      }

      proposals[index].supervisor = select.value;
      proposals[index].status = "Assigned";

      loadProposals();
      loadSupervisors();
    }

    function loadSupervisors() {
      const container = document.getElementById("supervisorList");
      container.innerHTML = "";

      supervisors.forEach(s => {
        const assigned = proposals.filter(p => p.supervisor === s);

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <h3>${s}</h3>
          <ul>
            ${assigned.map(a => `<li>${a.student} — ${a.project}</li>`).join("") || "<li>No assignments</li>"}
          </ul>
        `;

        container.appendChild(div);
      });
    }

    function loadFeedback() {
      const container = document.getElementById("feedbackList");
      container.innerHTML = "";

      supervisorFeedback.forEach(f => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <p><strong>Student:</strong> ${f.student}</p>
          <p><strong>Supervisor:</strong> ${f.supervisor}</p>
          <p>${f.feedback}</p>
        `;

        container.appendChild(div);
      });
    }

    function loadReports() {
      const container = document.getElementById("reportList");
      container.innerHTML = "";

      studentReports.forEach(r => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <p><strong>Student:</strong> ${r.student}</p>
          <p><strong>Project:</strong> ${r.project}</p>
          <p><strong>Progress:</strong> ${r.progress}</p>
          <p><strong>Remark:</strong> ${r.remark}</p>
        `;

        container.appendChild(div);
      });
    }

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    loadProposals();
    loadSupervisors();
    loadFeedback();
    loadReports();
  </script>

</body>
</html>
