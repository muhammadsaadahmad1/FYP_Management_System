<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quick Login Test | FYP Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #1e40af; }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🔍 Student Login Debug Test</h1>
    
    <div class="test-section">
        <h3>1. Firebase Connection Test</h3>
        <div id="connection-status" class="status info">Testing connection...</div>
        <button onclick="testConnection()">Test Firebase Connection</button>
    </div>

    <div class="test-section">
        <h3>2. Check Existing Student Accounts</h3>
        <div id="students-status" class="status info">Click to check students...</div>
        <button onclick="checkExistingStudents()">Check Student Accounts</button>
    </div>

    <div class="test-section">
        <h3>3. Create Test Student Account</h3>
        <input type="text" id="test-reg-number" placeholder="Registration Number (e.g., TEST-001)">
        <input type="email" id="test-email" placeholder="Email (e.g., test@student.edu)">
        <input type="password" id="test-password" placeholder="Password (min 6 chars)">
        <input type="text" id="test-name" placeholder="Full Name">
        <button onclick="createTestStudent()">Create Test Student</button>
        <div id="create-status" class="status info"></div>
    </div>

    <div class="test-section">
        <h3>4. Test Student Login</h3>
        <input type="text" id="login-reg-number" placeholder="Registration Number">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="testStudentLogin()">Test Login</button>
        <div id="login-status" class="status info"></div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCljq20BTSxK2mRWicAsfAjh7B8ZTDSNgQ",
            authDomain: "fypmanagementsystem-29faf.firebaseapp.com",
            projectId: "fypmanagementsystem-29faf",
            storageBucket: "fypmanagementsystem-29faf.firebasestorage.app",
            messagingSenderId: "215218060669",
            appId: "1:215218060669:web:2cb287d2aa4b545f50a014",
            measurementId: "G-4DQVXVP3NX"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Test Firebase Connection
        function testConnection() {
            try {
                const app = firebase.app();
                updateStatus('connection-status', '✅ Firebase connected successfully! Project: ' + app.options.projectId, 'success');
            } catch (error) {
                updateStatus('connection-status', '❌ Firebase connection failed: ' + error.message, 'error');
            }
        }

        // Check Existing Students
        async function checkExistingStudents() {
            try {
                updateStatus('students-status', '🔄 Checking student accounts...', 'info');
                
                const snapshot = await db.collection('users').where('role', '==', 'student').get();
                
                if (snapshot.empty) {
                    updateStatus('students-status', '❌ No student accounts found in database', 'error');
                } else {
                    const students = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    
                    let html = '<h4>Found ' + students.length + ' Student Accounts:</h4>';
                    students.forEach(student => {
                        html += `<p><strong>${student.loginId || student.email}</strong> - ${student.displayName} (${student.isActive ? 'Active' : 'Inactive'})</p>`;
                    });
                    
                    updateStatus('students-status', html, 'success');
                }
            } catch (error) {
                updateStatus('students-status', '❌ Error checking students: ' + error.message, 'error');
            }
        }

        // Create Test Student
        async function createTestStudent() {
            try {
                const regNumber = document.getElementById('test-reg-number').value;
                const email = document.getElementById('test-email').value;
                const password = document.getElementById('test-password').value;
                const name = document.getElementById('test-name').value;

                if (!regNumber || !email || !password || !name) {
                    updateStatus('create-status', '⚠️ Please fill all fields', 'error');
                    return;
                }

                updateStatus('create-status', '🔄 Creating test student...', 'info');

                // Create Firebase Auth user
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Create Firestore document
                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    email: email,
                    displayName: name,
                    role: 'student',
                    loginId: regNumber,
                    groupId: user.uid,
                    isGroupLeader: true,
                    isActive: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                updateStatus('create-status', '✅ Test student created successfully! You can now login with Registration Number: ' + regNumber, 'success');

            } catch (error) {
                updateStatus('create-status', '❌ Error creating student: ' + error.message, 'error');
            }
        }

        // Test Student Login
        async function testStudentLogin() {
            try {
                const regNumber = document.getElementById('login-reg-number').value;
                const password = document.getElementById('login-password').value;

                if (!regNumber || !password) {
                    updateStatus('login-status', '⚠️ Please enter registration number and password', 'error');
                    return;
                }

                updateStatus('login-status', '🔄 Testing login...', 'info');

                // Find student by registration number
                const snapshot = await db.collection('users').where('loginId', '==', regNumber).where('role', '==', 'student').get();
                
                if (snapshot.empty) {
                    updateStatus('login-status', '❌ Registration number not found', 'error');
                    return;
                }

                const userDoc = snapshot.docs[0];
                const userData = userDoc.data();

                // Try Firebase Auth login
                const userCredential = await auth.signInWithEmailAndPassword(userData.email, password);
                
                updateStatus('login-status', '✅ Login successful! Student: ' + userData.displayName + ' (' + userData.email + ')', 'success');

                // Store in localStorage like main login
                localStorage.setItem('uid', userCredential.user.uid);
                localStorage.setItem('role', 'student');
                localStorage.setItem('displayName', userData.displayName);
                localStorage.setItem('groupId', userData.groupId);
                localStorage.setItem('loginId', userData.loginId);

            } catch (error) {
                updateStatus('login-status', '❌ Login failed: ' + error.message, 'error');
            }
        }

        function updateStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = message;
            element.className = 'status ' + type;
        }

        // Auto-test connection on load
        window.onload = function() {
            testConnection();
        };
    </script>
</body>
</html>
